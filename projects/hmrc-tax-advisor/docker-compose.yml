version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8200:8200"
    environment:
      - OLLAMA_URL=http://192.168.0.92:11434
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://192.168.0.197:8200
    ports:
      - "3100:3100"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qdrant-data:
